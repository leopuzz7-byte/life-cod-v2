<!DOCTYPE html>
<html lang="ru">
<head><meta charset="utf-8"><title>Механики удержания — бот Надежды</title></head>
<body style="margin:24px;background:#fff;">
<div style="font-family:Arial,Helvetica,sans-serif;max-width:680px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
<div style="border:1px solid #D3D1C7;border-radius:12px;padding:16px;">
<div style="font-size:14px;font-weight:600;color:#26215C;margin-bottom:6px;">Рассылка для неплативших</div>
<div style="font-size:12px;color:#5F5E5A;line-height:1.5;">20-30 заготовленных вопросов: «как ты сегодня?», «что на душе?»</div>
</div>
<div style="border:1px solid #D3D1C7;border-radius:12px;padding:16px;">
<div style="font-size:14px;font-weight:600;color:#26215C;margin-bottom:6px;">Еженедельный разбор</div>
<div style="font-size:12px;color:#5F5E5A;line-height:1.5;">Раз в неделю — разбор по прошедшей неделе</div>
</div>
<div style="border:1px solid #D3D1C7;border-radius:12px;padding:16px;">
<div style="font-size:14px;font-weight:600;color:#26215C;margin-bottom:6px;">Крючок «приходи завтра»</div>
<div style="font-size:12px;color:#5F5E5A;line-height:1.5;">Интрига в финале разбора дня, чтобы вернуться</div>
</div>
<div style="border:1px solid #D3D1C7;border-radius:12px;padding:16px;">
<div style="font-size:14px;font-weight:600;color:#26215C;margin-bottom:6px;">Реферальная программа</div>
<div style="font-size:12px;color:#5F5E5A;line-height:1.5;">Приведи друга — оба получаете день доступа</div>
</div>
</div>
</body></html>
