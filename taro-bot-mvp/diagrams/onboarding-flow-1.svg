<svg width="100%" viewBox="0 0 680 588" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Онбординг бота Надежды — от старта до выбора карты</title>
<desc>Пять последовательных шагов: команда старт, видео-кружок знакомства, вопросы имени и даты рождения, анимация ожидания, мини-выбор одной из трёх карт.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="200" y="40" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="#444441">/start</text>
<line x1="340" y1="84" x2="340" y2="144" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="200" y="144" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="164" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="#3C3489">Видео-кружок Надежды</text>
<text x="340" y="184" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#534AB7">видео 15-20 сек, знакомство</text>
<line x1="340" y1="200" x2="340" y2="260" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="200" y="260" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="280" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="#085041">Имя и дата рождения</text>
<text x="340" y="300" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#0F6E56">два коротких текстовых вопроса</text>
<line x1="340" y1="316" x2="340" y2="376" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="200" y="376" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="396" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="#085041">Анимация ожидания</text>
<text x="340" y="416" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#0F6E56">4-6 сек, текст меняется</text>
<line x1="340" y1="432" x2="340" y2="492" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="200" y="492" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="512" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="#085041">Мини-выбор карты</text>
<text x="340" y="532" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#0F6E56">тап по одной из трёх, не думая</text>
</svg>
